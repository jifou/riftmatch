services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: lolp_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"   # exposé sur l'hôte pour seed local et outils (Compass, etc.)
    networks:
      - lolp_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Seed / Migration ─────────────────────────────────────────────────────────
  seed:
    image: node:20-alpine
    container_name: lolp_seed
    profiles: ["seed"]   # lancé uniquement via --profile seed
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - ./package.json:/app/package.json
    environment:
      MONGODB_URI: mongodb://mongo:27017/lolpersonnality
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@riftmatch.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    command: >
      sh -c "npm install --omit=dev --silent && node scripts/seed.mjs ${SEED_ARGS:-}"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - lolp_net

  # ── Payload CMS ──────────────────────────────────────────────────────────────
  payload:
    build:
      context: ./payload
      dockerfile: Dockerfile
    container_name: lolp_payload
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/lolpersonnality
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-super_secret_change_me}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
      FRONTEND_URL: http://localhost
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3001:3000"   # accès direct CMS en dev (3001 sur l'hôte → 3000 dans le container)
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./payload/src:/app/src          # hot reload
      - payload_uploads:/app/uploads
    networks:
      - lolp_net

  # ── Astro Frontend ───────────────────────────────────────────────────────────
  astro:
    build:
      context: ./astro
      dockerfile: Dockerfile
    container_name: lolp_astro
    restart: unless-stopped
    environment:
      PAYLOAD_API_URL: http://payload:3000
      PUBLIC_PAYLOAD_URL: http://localhost
      PORT: 4321
      NODE_ENV: development
    ports:
      - "4321:4321"   # accès direct Astro en dev
    depends_on:
      - payload
    volumes:
      - ./astro/src:/app/src            # hot reload
    networks:
      - lolp_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lolp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - payload
      - astro
    networks:
      - lolp_net

volumes:
  mongo_data:
  payload_uploads:

networks:
  lolp_net:
    driver: bridge
