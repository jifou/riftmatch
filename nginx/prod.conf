# ══════════════════════════════════════════════════════════════════════════════
#  nginx/prod.conf — RiftMatch PRODUCTION
#  Domaines : riftmatch.io + cms.riftmatch.io
#  SSL : Let's Encrypt via Certbot
# ══════════════════════════════════════════════════════════════════════════════

upstream payload_upstream {
    server payload:3000;
}

upstream astro_upstream {
    server astro:4321;
}

# ── Redirect HTTP → HTTPS (tous domaines) ───────────────────────────────────
server {
    listen 80;
    server_name riftmatch.io www.riftmatch.io cms.riftmatch.io;

    # Challenge Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── riftmatch.io (Frontend Astro) ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name riftmatch.io www.riftmatch.io;

    ssl_certificate     /etc/letsencrypt/live/riftmatch.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riftmatch.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Sécurité headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # www → non-www
    if ($host = www.riftmatch.io) {
        return 301 https://riftmatch.io$request_uri;
    }

    location / {
        proxy_pass         http://astro_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── cms.riftmatch.io (Payload CMS) ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cms.riftmatch.io;

    ssl_certificate     /etc/letsencrypt/live/cms.riftmatch.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.riftmatch.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://payload_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
