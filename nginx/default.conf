upstream payload {
    server payload:3000;
}

upstream astro {
    server astro:4321;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Transmettre les headers Traefik aux upstreams
    # (Traefik ajoute X-Forwarded-Proto: https — Astro en a besoin pour les URLs canoniques)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # Payload CMS admin & API
    location /admin {
        proxy_pass http://payload;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        proxy_pass http://payload;
        proxy_http_version 1.1;
    }

    # Astro frontend — everything else
    location / {
        proxy_pass http://astro;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
