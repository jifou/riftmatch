  {v:"void_entity",icon:"👁️",n:t.s7_void_e,d:t.s7_void_e_d},
  {v:"spirit",icon:"✨",n:t.s7_spirit,d:t.s7_spirit_d}
]}
]}

// =============================================
// STATE
// =============================================
const RANK_TO_DIFF={iron:[1,2],bronze:[1,2],silver:[2,3],gold:[2,3],platinum:[3,4],emerald:[3,4],diamond:[4,5],master:[4,5]};
let lang='fr', step=0, answers={};

function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&I18N[p])return p;
  const b=navigator.language.toLowerCase();
  if(b.startsWith('es'))return'es';
  if(b.startsWith('en'))return'en';
  return'fr';
}

function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(l.toUpperCase())));
  updateStaticText();
  renderStep();
}

function updateStaticText(){
  const t=I18N[lang];
  document.getElementById('h-logo').textContent=t.logo;
  document.getElementById('h-title').textContent=t.title;
  document.getElementById('h-sub').textContent=t.sub;
  document.querySelector('title').textContent=lang==='en'?'Which LoL Champion Are You? | League of Legends Quiz 2025':lang==='es'?'¿Qué Campeón de LoL Eres? | Quiz League of Legends 2025':'Quel Champion LoL es-tu ? | Quiz League of Legends 2025';
  document.querySelector('meta[name="description"]').content=lang==='en'?'Discover which League of Legends champion matches your playstyle. Free quiz among 165 champions — personalized results in seconds.':lang==='es'?'Descubre qué campeón de League of Legends se adapta a tu estilo. Quiz gratuito entre 165 campeones.':'Découvre quel champion League of Legends correspond à ton style de jeu. Quiz gratuit parmi 165 champions.';
}

// =============================================
// RENDER QUIZ
// =============================================
function initDots(){
  const d=document.getElementById('step-dots');
  const steps=STEPS(I18N[lang]);
  d.innerHTML=steps.map((_,i)=>`<div class="step-dot" id="dot-${i}"></div>`).join('');
}

function updateProgress(){
  const t=I18N[lang];
  const steps=STEPS(t);
  const pct=Math.round((step/steps.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-step').textContent=t.step_of.replace('{n}',step+1);
  document.getElementById('prog-pct').textContent=pct+'%';
  steps.forEach((_,i)=>{
    const dot=document.getElementById('dot-'+i);
    if(dot)dot.className='step-dot'+(i===step?' active':i<step?' done':'');
  });
}

function renderStep(){
  const t=I18N[lang];
  const steps=STEPS(t);
  const s=steps[step];
  updateProgress();
  const saved=answers[s.id];
  const isSel=v=>s.multi?(Array.isArray(saved)&&saved.includes(v)):saved===v||saved==v;
  let inner='';
  if(s.type==='rank'){
    inner=`<div class="rank-grid">`+s.opts.map(o=>`
      <div class="rank-card ${isSel(o.v)?'sel':''}" onclick="pick('${s.id}','${o.v}',${s.multi},this)">
        <span class="rank-icon">${o.icon}</span>
        <div class="rank-name">${o.n}</div>
        <div class="rank-desc">${o.d}</div>
      </div>`).join('')+`</div>`;
  } else if(s.type==='faction'){
    inner=`<div class="fact-grid">`+s.opts.map(o=>`
      <div class="fact-card ${isSel(o.v)?'sel':''}" onclick="pick('${s.id}','${o.v}',${s.multi},this)">
        <span class="fact-icon">${o.icon}</span>
        <div class="fact-name">${o.n}</div>
      </div>`).join('')+`</div>`;
  } else {
    inner=`<div class="opts ${s.type}">`+s.opts.map(o=>{
      const val=typeof o.v==='number'?o.v:`'${o.v}'`;
      return`<div class="opt ${isSel(o.v)?'sel':''}" onclick="pick('${s.id}',${val},${s.multi},this)">
        <span class="opt-icon">${o.icon}</span>
        <div class="opt-name">${o.n}</div>
        <div class="opt-desc">${o.d}</div>
      </div>`;}).join('')+`</div>`;
  }
  const totalSteps=steps.length;
  document.getElementById('question-area').innerHTML=`
    <div class="question-card">
      <div class="q-step">${t.step_of.replace('{n}',step+1)} — ${s.lbl}</div>
      <div class="q-text">${s.q}</div>
      <div class="q-sub">${s.sub}</div>
      ${s.multi?`<p class="multi-hint">${t.multi_hint}</p>`:''}
      <div class="gold-line"></div>
      ${inner}
      <div class="nav-row">
        ${step>0?`<button class="btn btn-back" onclick="prevStep()">${t.back}</button>`:''}
        <button class="btn btn-next" id="btn-next" onclick="nextStep()" disabled>
          ${step<totalSteps-1?t.next:t.finish}
        </button>
      </div>
    </div>`;
  checkBtn();
}

function pick(id,val,multi,el){
  if(multi){
    if(!answers[id])answers[id]=[];
    const a=answers[id],i=a.indexOf(val);
    if(i>=0){a.splice(i,1);el.classList.remove('sel');}
    else{a.push(val);el.classList.add('sel');}
  } else {
    answers[id]=val;
    el.closest('.rank-grid,.fact-grid,.opts').querySelectorAll('.rank-card,.fact-card,.opt').forEach(c=>c.classList.remove('sel'));
    el.classList.add('sel');
  }
  checkBtn();
}

function checkBtn(){
  const s=STEPS(I18N[lang])[step];
  const a=answers[s.id];
  const ok=s.multi?(a&&a.length>0):(a!==undefined&&a!==null);
  const btn=document.getElementById('btn-next');
  if(btn)btn.disabled=!ok;
}

function nextStep(){
  const steps=STEPS(I18N[lang]);
  if(step<steps.length-1){step++;renderStep();scrollTo({top:0,behavior:'smooth'});}
  else showResults();
}

function prevStep(){
  if(step>0){step--;renderStep();scrollTo({top:0,behavior:'smooth'});}
}

// =============================================
// SCORING
// =============================================
function score(c){
  const t=I18N[lang];
  let s=0,max=0,reasons=[];
  const rank=answers.rank||'gold';
  const prefDiffs=RANK_TO_DIFF[rank]||[2,3];

  // Lane 28pts
  max+=28;
  const lane=answers.lane;
  if(!lane||lane==='any')s+=14;
  else if(c.lanes.includes(lane)){s+=28;reasons.push(t.reason_lane);}

  // Archetype 25pts
  max+=25;
  const arch=answers.archetype;
  if(arch&&c.archetypes.includes(arch)){s+=25;reasons.push(t.reason_role);}
  else if(arch){const close={tank:['fighter'],fighter:['tank','assassin'],mage:['support','assassin'],assassin:['fighter','mage'],support:['mage'],adc:['fighter']};if(close[arch]&&close[arch].some(a=>c.archetypes.includes(a)))s+=10;}

  // Style 20pts
  max+=20;
  const styles=answers.style||[];
  if(styles.length>0){const m=styles.filter(st=>c.styles.includes(st)).length;s+=Math.round((m/styles.length)*20);if(m>0)reasons.push(t.reason_style);}else s+=10;

  // Faction 15pts
  max+=15;
  const faction=answers.faction;
  if(!faction||faction==='runeterra')s+=8;
  else if(c.faction===faction||c.faction==='darkin'&&faction==='noxus'){s+=15;reasons.push(t.reason_faction);}

  // Difficulty 15pts (adjusted by rank)
  max+=15;
  const diff=answers.difficulty;
  if(!diff||diff===0){
    if(prefDiffs.includes(c.difficulty)){s+=15;reasons.push(t.reason_diff);}
    else if(Math.abs(c.difficulty-prefDiffs[0])<=1)s+=8;
    else s+=3;
  } else {
    const dist=Math.abs(c.difficulty-diff);
    if(dist===0){s+=15;reasons.push(t.reason_diff);}
    else if(dist===1)s+=9;
    else if(dist===2)s+=4;
  }

  // Universe 10pts
  max+=10;
  const univs=answers.universe||[];
  if(univs.length>0){const m=univs.filter(u=>c.universes.includes(u)).length;s+=Math.round((m/univs.length)*10);if(m>0)reasons.push(t.reason_univ);}else s+=5;

  // Type 10pts
  max+=10;
  const types=answers.type||[];
  if(types.length>0){const m=types.filter(tp=>c.types.includes(tp)).length;s+=Math.round((m/types.length)*10);if(m>0)reasons.push(t.reason_type);}else s+=5;

  return{c,s,pct:Math.min(99,Math.round((s/max)*100)),reasons};
}

// =============================================
// RESULTS
// =============================================
const DIFF_CLR=['','#4CAF50','#8BC34A','#FFC107','#FF5722','#F44336'];
const FACT_NAMES={demacia:'Démacia/Demacia',noxus:'Noxus',ionia:'Ionie/Ionia',freljord:'Freljord',shurima:'Shurima',piltover:'Piltover',zaun:'Zaun',bilgewater:'Bilgewater',shadow_isles:'Shadow Isles',targon:'Targon',void:'Void',ixtal:'Ixtal',bandle_city:'Bandle City',darkin:'Darkin',runeterra:'Runeterra'};

function showResults(){
  document.getElementById('quiz').style.display='none';
  const res=document.getElementById('results');
  res.style.display='block';
  const t=I18N[lang];
  document.getElementById('res-title').textContent=t.res_title;
  document.getElementById('res-sub').textContent=t.res_sub;
  document.getElementById('btn-restart').textContent=t.restart;

  const scored=CHAMPIONS.map(score).sort((a,b)=>b.s-a.s).slice(0,5);
  const ranks=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const bios=BIOS[lang]||BIOS.en;

  document.getElementById('champ-list').innerHTML=scored.map((r,i)=>{
    const c=r.c;
    const img=`https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${c.apiId}_0.jpg`;
    const bio=bios[c.name]||BIOS.en[c.name]||'';
    const lanes=c.lanes.map(l=>`<span class="tag tag-l">${t['tag_'+l]||l}</span>`).join('');
    const archs=c.archetypes.map(a=>`<span class="tag tag-a">${t['tag_'+a]||a}</span>`).join('');
    const fact=`<span class="tag tag-f">${FACT_NAMES[c.faction]||c.faction}</span>`;
    const dc=DIFF_CLR[c.difficulty]||'#888';
    const diff=`<span class="tag tag-d" style="border:1px solid ${dc}44;color:${dc}">${(t.diff_labels||[])[c.difficulty]||''}</span>`;
    const reasons=r.reasons.map(r=>`<span class="reason-tag">${r}</span>`).join('');
    const opgg=`https://www.op.gg/champions/${c.name.toLowerCase().replace(/[^a-z]/g,'')}`;
    const mobafire=`https://www.mobafire.com/league-of-legends/${c.name.toLowerCase().replace(/[^a-z]/g,'-')}-guide`;
    return`<article class="champ-card" style="animation-delay:${i*.12}s">
      <div class="champ-img-wrap">
        <img class="champ-img" src="${img}" alt="${c.name} League of Legends champion" loading="lazy" onerror="this.style.background='#1a2d40'">
        <div class="champ-rank">${ranks[i]}</div>
      </div>
      <div class="champ-info">
        <div>
          <div class="champ-name">${c.name}</div>
          <div class="match-row">
            <span class="match-pct">${r.pct}%</span>
            <div class="match-bar"><div class="match-fill" style="width:0%" data-w="${r.pct}%"></div></div>
          </div>
        </div>
        <div class="champ-tags">${lanes}${archs}${fact}${diff}</div>
        <p class="champ-bio">${bio}</p>
        ${reasons?`<div class="reasons">${reasons}</div>`:''}
        <div class="champ-links">
          <a class="champ-link link-opgg" href="${opgg}" target="_blank" rel="noopener">${t.link_stats}</a>
          <a class="champ-link link-guide" href="${mobafire}" target="_blank" rel="noopener">${t.link_guide}</a>
        </div>
      </div>
    </article>`;
  }).join('');

  // animate bars
  setTimeout(()=>document.querySelectorAll('.match-fill').forEach(el=>el.style.width=el.dataset.w),200);

  // Affiliation
  renderAff(scored[0]?scored[0].c:null);
  scrollTo({top:0,behavior:'smooth'});
}

function renderAff(topChamp){
  const t=I18N[lang];
  const rank=answers.rank||'gold';
  const isLow=['iron','bronze','silver'].includes(rank);
  const isMid=['gold','platinum','emerald'].includes(rank);
  const badge=isLow?t.coaching_badge_iron:isMid?t.coaching_badge_gold:t.coaching_badge_dia;
  const champSlug=topChamp?topChamp.name.toLowerCase().replace(/[^a-z]/g,''):'ahri';

  document.getElementById('aff-section').innerHTML=`
    <h2 class="aff-title">${t.aff_title}</h2>
    <p class="aff-sub">${t.aff_sub}</p>
    <div class="aff-grid">
      <a class="aff-card" href="https://www.proguides.com/?utm_source=lolpersonality&utm_medium=quiz&utm_campaign=result" target="_blank" rel="noopener sponsored">
        <span class="aff-icon">🎓</span>
        <div class="aff-card-title">${t.aff_coaching_title}</div>
        <div class="aff-coaching-badge">${badge}</div>
        <div class="aff-card-desc">${t.aff_coaching_desc}</div>
        <span class="aff-cta">${t.aff_coaching_cta}</span>
      </a>
      <a class="aff-card" href="https://www.op.gg/champions/${champSlug}?utm_source=lolpersonality" target="_blank" rel="noopener">
        <span class="aff-icon">📊</span>
        <div class="aff-card-title">${t.aff_stats_title}</div>
        <div class="aff-card-desc">${t.aff_stats_desc}</div>
        <span class="aff-cta">${t.aff_stats_cta}</span>
      </a>
      <a class="aff-card" href="https://amzn.to/lol-gaming-setup?utm_source=lolpersonality&utm_medium=quiz" target="_blank" rel="noopener sponsored">
        <span class="aff-icon">🖱️</span>
        <div class="aff-card-title">${t.aff_gear_title}</div>
        <div class="aff-card-desc">${t.aff_gear_desc}</div>
        <span class="aff-cta">${t.aff_gear_cta}</span>
      </a>
      <a class="aff-card" href="https://store.steampowered.com/?utm_source=lolpersonality" target="_blank" rel="noopener">
        <span class="aff-icon">🎨</span>
        <div class="aff-card-title">${t.aff_skins_title}</div>
        <div class="aff-card-desc">${t.aff_skins_desc}</div>
        <span class="aff-cta">${t.aff_skins_cta}</span>
      </a>
    </div>`;
}

function restart(){
  step=0;answers={};
  document.getElementById('quiz').style.display='block';
  document.getElementById('results').style.display='none';
  initDots();renderStep();
  scrollTo({top:0,behavior:'smooth'});
}

// INIT
lang=detectLang();
document.documentElement.lang=lang;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(lang.toUpperCase())));
updateStaticText();
initDots();
renderStep();
</script>
